<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Map · Kings of Shutesbury</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="style.css">
</head>
<body class="map-page">
  <header>
    <div class="wrap">
      <a class="back-link" href="index.html">← Kings of Shutesbury</a>
      <h1>Segment map <span class="crown">♛</span></h1>
      <div class="map-controls">
        <div class="metric-switch" id="metric-switch">
          <span class="muted">color by:</span>
          <button data-metric="difficulty" class="active">Importance</button>
          <button data-metric="grade">Grade</button>
          <button data-metric="length">Length</button>
        </div>
        <label class="toggle"><input type="checkbox" id="show-filtered" checked>
          show filtered-out</label>
      </div>
    </div>
  </header>

  <div id="map"></div>
  <div id="legend" class="legend"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="util.js"></script>
  <script src="map.js"></script>
</body>
</html>
